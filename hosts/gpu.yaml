# Host configuration for gpu
# GPU workstation / compute server — Nvidia drivers + conditional GUI (same pattern as homebot)

host: gpu
description: Arch Linux GPU machine with Nvidia drivers, Niri on-demand desktop, and Docker

# Shared base — core + desktop stack (gpu runs a debug GUI + compute)
import:
  - hosts/profiles/core.yaml
  - hosts/profiles/desktop.yaml

# Host-specific modules only
enabled_modules:
  - nvim-config              # Full LazyVim Neovim config
  - nvidia                   # Nvidia open drivers + CUDA + Wayland support
  - gpu-niri                 # Host-specific Niri monitor/workspace config
  - docker                   # Docker engine + nvidia-container-runtime
  - gpu-zfs                  # ZFS DKMS + import/create mirror pool (sda+sdb)

# Module processing mode
module_processing: parallel

# Host-specific packages (beyond what's in modules)
packages:
  - bemenu
  # GPU / compute extras
  - nvtop                   # GPU process monitor (like htop for GPUs)
  - python-pytorch-cuda     # PyTorch with CUDA support (AUR)

# Exclude AMD GPU stack (this machine uses Nvidia)
exclude:
  - vulkan-radeon
  - mesa                    # Replaced by nvidia's GL implementation

# Configuration backup settings
config_backups:
  enabled: true
  max_backups: 5

# System backup settings
system_backups:
  enabled: true
  backup_on_sync: true
  backup_on_update: true
  tool: snapper
  snapper_config: root

# Settings
flatpak_scope: user
auto_prune: false
aur_helper: paru

# Services to enable
services:
  enabled:
    - bluetooth
  disabled: []

# Nvidia drivers, compute stack, and container GPU support

description: Nvidia open drivers, utils, and Wayland/CUDA support

packages:
  # Kernel modules — CachyOS ships kernel-integrated nvidia packages
  # (these conflict with generic nvidia-open-dkms, do not use that)
  - linux-cachyos-nvidia-open      # Nvidia open module for cachyos kernel
  - linux-cachyos-lts-nvidia-open  # Nvidia open module for cachyos-lts kernel
  - linux-firmware-nvidia          # Nvidia firmware blobs
  - nvidia-utils            # Userspace tools (nvidia-smi, etc.)
  - nvidia-settings         # GUI configuration panel

  # Wayland support
  - egl-wayland             # EGLStream → Wayland bridge for Niri/wlroots

  # VA-API (hardware video decode/encode via NVDEC)
  - libva-nvidia-driver     # VA-API backend for Nvidia (AUR)

  # Compute
  - opencl-nvidia           # OpenCL ICD for Nvidia
  - cuda                    # CUDA toolkit
  - cudnn                   # cuDNN (deep learning primitives)

  # Container GPU support
  - nvidia-container-toolkit  # Exposes GPU to Docker/Podman containers
